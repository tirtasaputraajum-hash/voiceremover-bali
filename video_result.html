<!DOCTYPE html>
<html>
<head>
    <title>Video Karaoke Siap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #101826; color: #f5f7ff; padding: 20px; }
        .box { background: #182338; padding: 24px; border-radius: 16px; max-width: 650px; margin: auto; }
        video { width: 100%; max-height: 70vh; border-radius: 12px; margin: 10px 0 18px; background: #000; }
        .btn { display: block; padding: 13px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-bottom: 10px; }
        .ok { background: #00b894; color: #07251f; }
        .srt { background: #0984e3; color: #ffffff; }
        .back { color: #9db1d2; text-decoration: none; display: block; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Video Karaoke Berhasil Dibuat</h2>
        <video controls><source src="/static/{{ video_file }}" type="video/mp4"></video>

        <a href="/static/{{ video_file }}" download class="btn ok">Download Video</a>
        {% if subtitle_file %}
        <a href="/static/{{ subtitle_file }}" download class="btn srt">Download Subtitle (SRT)</a>
        {% endif %}

        <a href="{{ url_for('create_video') }}?audio={{ audio_file }}" class="back">Buat versi video lain</a>
        <a href="/" class="back">Kembali ke awal</a>
    </div>
</body>
</html>
